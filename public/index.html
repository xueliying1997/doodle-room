<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>你画我猜白板</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="房间控制">
        <div class="room-block">
          <span class="label">房间码</span>
          <div class="room-row">
            <input id="roomInput" aria-label="房间码" maxlength="8" autocomplete="off" />
            <button id="joinBtn" type="button">加入</button>
            <button id="newRoomBtn" type="button">新房间</button>
          </div>
          <div class="invite-card" aria-label="扫码加入房间">
            <img id="roomQr" alt="扫码加入当前房间" />
            <div class="invite-copy">
              <span class="label">扫码加入</span>
              <strong id="roomCodeText">等待房间</strong>
              <input id="shareLink" aria-label="房间邀请链接" readonly />
              <button id="copyLinkBtn" type="button">复制链接</button>
            </div>
          </div>
        </div>
        <div class="status-strip" aria-live="polite">
          <div><span class="label">本轮画手</span><strong id="drawerText">等待玩家</strong></div>
          <div><span class="label">你的提示</span><strong id="wordText">加入房间后开始</strong></div>
          <div><span class="label">倒计时</span><strong id="timerText">02:00</strong></div>
          <div><span class="label">在线</span><strong id="playersText">1</strong></div>
        </div>
      </section>

      <section class="toolbelt" aria-label="游戏工具">
        <div class="colors" aria-label="颜色">
          <button class="swatch active" type="button" data-color="#111827" aria-label="黑色"></button>
          <button class="swatch" type="button" data-color="#ef4444" aria-label="红色"></button>
          <button class="swatch" type="button" data-color="#f59e0b" aria-label="黄色"></button>
          <button class="swatch" type="button" data-color="#10b981" aria-label="绿色"></button>
          <button class="swatch" type="button" data-color="#2563eb" aria-label="蓝色"></button>
          <button class="swatch" type="button" data-color="#7c3aed" aria-label="紫色"></button>
        </div>
        <label class="size-control"><span class="label">笔刷</span><input id="sizeInput" type="range" min="2" max="28" value="6" /></label>
        <button id="undoBtn" type="button">撤销</button>
        <button id="clearBtn" type="button">清空</button>
        <button id="exportBtn" type="button">导出 PNG</button>
        <button id="roundBtn" type="button">下一轮</button>
      </section>

      <section class="board-wrap" aria-label="实时画布">
        <canvas id="board"></canvas>
        <div id="roleBadge" class="role-badge">连接中</div>
      </section>

      <section class="guess-panel" aria-label="猜词">
        <form id="guessForm" class="guess-form">
          <input id="guessInput" aria-label="输入猜测" placeholder="输入你猜的词" autocomplete="off" />
          <button id="guessBtn" type="submit">提交猜测</button>
        </form>
        <div id="resultText" class="result-text">观看画手作画，然后猜词。</div>
        <div id="guessList" class="guess-list" aria-live="polite"></div>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
